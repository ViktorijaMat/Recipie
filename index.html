<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Recipie" />
  <meta name="theme-color" content="#f9a8c9" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Recipie 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
 
  <!-- SPLASH -->
  <div id="splash">
    <div class="splash-inner">
      <div class="splash-icon">🌸</div>
      <h1>Recipie</h1>
      <p>Your sweet little kitchen companion</p>
    </div>
  </div>
 
  <!-- APP SHELL -->
  <div id="app" class="hidden">
 
    <!-- VIEWS -->
    <div id="view-home" class="view active">
      <header class="app-header">
        <div class="header-top">
          <div>
            <h1 class="app-title">Recipie <span>🌸</span></h1>
            <p class="app-subtitle" id="recipe-count-label">Loading your recipes…</p>
          </div>
          <button class="btn-icon" id="btn-search-toggle" aria-label="Search">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </button>
        </div>
        <div id="search-bar" class="search-bar hidden">
          <input type="text" id="search-input" placeholder="Search recipes, ingredients…" />
          <button class="btn-icon" id="btn-search-clear">✕</button>
        </div>
        <!-- Category filter -->
        <div class="category-scroll">
          <button class="cat-chip active" data-cat="all">All</button>
          <button class="cat-chip" data-cat="Breakfast">🍳 Breakfast</button>
          <button class="cat-chip" data-cat="Lunch">🥗 Lunch</button>
          <button class="cat-chip" data-cat="Dinner">🍽️ Dinner</button>
          <button class="cat-chip" data-cat="Dessert">🍰 Dessert</button>
          <button class="cat-chip" data-cat="Snack">🍿 Snacks</button>
          <button class="cat-chip" data-cat="Drinks">🥤 Drinks</button>
          <button class="cat-chip" data-cat="Baking">🥐 Baking</button>
          <button class="cat-chip" data-cat="Other">✨ Other</button>
        </div>
      </header>
 
      <main class="recipe-grid" id="recipe-grid">
        <!-- Cards injected here -->
      </main>
 
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon">🍴</div>
        <h2>No recipes yet!</h2>
        <p>Tap the <strong>+</strong> button below to add your first recipe.</p>
      </div>
    </div>
 
    <!-- RECIPE DETAIL VIEW -->
    <div id="view-detail" class="view">
      <header class="detail-header">
        <button class="btn-back" id="btn-back-detail">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back
        </button>
        <div class="detail-header-actions">
          <button class="btn-icon" id="btn-edit-recipe" aria-label="Edit">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn-icon btn-icon-danger" id="btn-delete-recipe" aria-label="Delete">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
      </header>
      <div id="detail-content" class="detail-content"></div>
    </div>
 
    <!-- ADD / EDIT FORM VIEW -->
    <div id="view-form" class="view">
      <header class="form-header">
        <button class="btn-back" id="btn-back-form">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Cancel
        </button>
        <h2 id="form-title">New Recipe</h2>
        <button class="btn-save" id="btn-save-recipe">Save</button>
      </header>
 
      <div class="form-body">
        <input type="hidden" id="edit-id" />
 
        <div class="form-section">
          <label>Recipe Name *</label>
          <input type="text" id="f-name" placeholder="e.g. Grandma's Pancakes" class="form-input" />
        </div>
 
        <div class="form-row">
          <div class="form-section">
            <label>Category</label>
            <select id="f-category" class="form-input form-select">
              <option value="Breakfast">🍳 Breakfast</option>
              <option value="Lunch">🥗 Lunch</option>
              <option value="Dinner">🍽️ Dinner</option>
              <option value="Dessert">🍰 Dessert</option>
              <option value="Snack">🍿 Snack</option>
              <option value="Drinks">🥤 Drinks</option>
              <option value="Baking">🥐 Baking</option>
              <option value="Other">✨ Other</option>
            </select>
          </div>
          <div class="form-section">
            <label>Servings</label>
            <input type="number" id="f-servings" placeholder="4" min="1" class="form-input" />
          </div>
        </div>
 
        <div class="form-row">
          <div class="form-section">
            <label>Prep Time</label>
            <input type="text" id="f-prep" placeholder="10 min" class="form-input" />
          </div>
          <div class="form-section">
            <label>Cook Time</label>
            <input type="text" id="f-cook" placeholder="30 min" class="form-input" />
          </div>
        </div>
 
        <div class="form-section">
          <label>Description</label>
          <textarea id="f-desc" placeholder="A short, sweet description…" class="form-input" rows="2"></textarea>
        </div>
 
        <div class="form-section">
          <label>Emoji / Icon</label>
          <div class="emoji-picker" id="emoji-picker">
            <span class="emoji-opt selected" data-emoji="🍽️">🍽️</span>
            <span class="emoji-opt" data-emoji="🥞">🥞</span>
            <span class="emoji-opt" data-emoji="🍰">🍰</span>
            <span class="emoji-opt" data-emoji="🍝">🍝</span>
            <span class="emoji-opt" data-emoji="🍜">🍜</span>
            <span class="emoji-opt" data-emoji="🥗">🥗</span>
            <span class="emoji-opt" data-emoji="🍕">🍕</span>
            <span class="emoji-opt" data-emoji="🍣">🍣</span>
            <span class="emoji-opt" data-emoji="🥘">🥘</span>
            <span class="emoji-opt" data-emoji="🍲">🍲</span>
            <span class="emoji-opt" data-emoji="🥐">🥐</span>
            <span class="emoji-opt" data-emoji="🍰">🎂</span>
            <span class="emoji-opt" data-emoji="🥤">🥤</span>
            <span class="emoji-opt" data-emoji="☕">☕</span>
            <span class="emoji-opt" data-emoji="🍵">🍵</span>
            <span class="emoji-opt" data-emoji="🍪">🍪</span>
            <span class="emoji-opt" data-emoji="🥩">🥩</span>
            <span class="emoji-opt" data-emoji="🍗">🍗</span>
            <span class="emoji-opt" data-emoji="🥚">🥚</span>
            <span class="emoji-opt" data-emoji="🥑">🥑</span>
          </div>
        </div>
 
        <div class="form-section">
          <div class="section-label-row">
            <label>Ingredients *</label>
            <button type="button" class="btn-add-item" id="btn-add-ingredient">+ Add</button>
          </div>
          <div id="ingredients-list" class="dynamic-list"></div>
        </div>
 
        <div class="form-section">
          <div class="section-label-row">
            <label>Instructions *</label>
            <button type="button" class="btn-add-item" id="btn-add-step">+ Add Step</button>
          </div>
          <div id="steps-list" class="dynamic-list"></div>
        </div>
 
        <div class="form-section">
          <label>Notes / Tips</label>
          <textarea id="f-notes" placeholder="Any extra tips, substitutions, or storage notes…" class="form-input" rows="3"></textarea>
        </div>
 
        <div class="form-section">
          <label>Tags <span class="label-hint">(comma separated)</span></label>
          <input type="text" id="f-tags" placeholder="e.g. quick, vegetarian, family favourite" class="form-input" />
        </div>
 
        <div class="form-bottom-space"></div>
      </div>
    </div>
 
    <!-- FAB -->
    <button id="fab" class="fab" aria-label="Add Recipe">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
 
  </div>
 
  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>
 
  <!-- DELETE CONFIRM -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-icon">🗑️</div>
      <h3>Delete Recipe?</h3>
      <p>This can't be undone.</p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-modal-cancel">Cancel</button>
        <button id="modal-confirm" class="btn-modal-confirm">Delete</button>
      </div>
    </div>
  </div>
 
  <script src="app.js"></script>
</body>
</html>
